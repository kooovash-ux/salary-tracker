<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Учет зарплаты</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#f8f9ff,#e8ecf4,#dde1ed);color:#1a1a2e;padding:0;min-height:100vh;max-width:1100px;margin:0 auto}
#pinOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#pinBox{background:rgba(255,255,255,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);padding:32px;text-align:center;width:300px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.08)}
#pinBox h2{margin-bottom:16px;font-size:15px;color:#1a1a2e;font-weight:600;letter-spacing:.3px}
#pinBox input{width:100%;padding:10px 12px;font-size:22px;text-align:center;border:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.5);color:#1a1a2e;margin-bottom:12px;letter-spacing:8px;font-family:Inter;outline:none;border-radius:10px}
#pinBox input:focus{border-color:rgba(99,102,241,.3);background:rgba(255,255,255,.7)}
#pinBox input::placeholder{color:rgba(0,0,0,.2)}
#pinBox .err{color:#e03131;font-size:12px;height:18px}
#pinBox button{width:100%;padding:10px;background:rgba(99,102,241,.1);color:#6366f1;border:1px solid rgba(99,102,241,.15);font-size:14px;cursor:pointer;font-family:Inter;border-radius:10px;font-weight:600;transition:all .2s}
#pinBox button:hover{background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.25)}
#content{display:none}
.header-bar{background:rgba(255,255,255,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06);color:#1a1a2e;padding:14px 20px;font-size:16px;font-weight:600;letter-spacing:.3px;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 16px 16px;justify-items:center}
.card{background:rgba(255,255,255,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.8);border-radius:14px;padding:14px 14px;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.04);max-width:220px}
.card:hover{background:rgba(255,255,255,.8);border-color:rgba(255,255,255,.9);transform:translateY(-1px)}
.card .label{font-size:9px;color:rgba(0,0,0,.35);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;font-weight:600}
.card .value{font-size:20px;font-weight:700;font-family:Inter,monospace;color:#1a1a2e}
.card .value.debt{color:#e03131}
.card .value.income{color:#2f9e44}
.section{font-size:13px;font-weight:600;margin:0 16px 8px;color:rgba(0,0,0,.4);letter-spacing:.5px;text-transform:uppercase}
.table-wrap{background:rgba(255,255,255,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.7);border-radius:14px;overflow:hidden;margin:0 16px 16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.table-wrap table{margin-bottom:0}
th{background:rgba(99,102,241,.06);color:rgba(0,0,0,.5);padding:10px 8px;font-size:10px;text-align:center;white-space:nowrap;font-weight:600;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid rgba(0,0,0,.05)}
td{padding:8px;font-size:12px;text-align:center;border-bottom:1px solid rgba(0,0,0,.03);font-family:Inter,monospace;color:rgba(0,0,0,.75)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(99,102,241,.04)}
.stat-paid{color:#2f9e44;font-weight:600}
.stat-part{color:#e8590c;font-weight:600}
.stat-unpaid{color:#e03131;font-weight:600}
.num{white-space:nowrap}
.form-wrap{background:rgba(255,255,255,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.7);border-radius:14px;padding:14px 16px;margin:0 16px 16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.form-wrap label{font-size:11px;color:rgba(0,0,0,.4)}
.form-wrap .frow{display:flex;gap:10px;align-items:flex-end;margin-top:6px;flex-wrap:wrap}
.form-wrap input{padding:8px 10px;border:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.6);color:#1a1a2e;font-size:13px;font-family:Inter;border-radius:8px;outline:none;transition:all .2s}
.form-wrap input:focus{border-color:rgba(99,102,241,.3);background:rgba(255,255,255,.8)}
.form-wrap input::placeholder{color:rgba(0,0,0,.2)}
.form-wrap button{padding:8px 16px;background:rgba(99,102,241,.08);color:#6366f1;border:1px solid rgba(99,102,241,.12);cursor:pointer;font-size:12px;font-family:Inter;border-radius:8px;font-weight:600;transition:all .2s}
.form-wrap button:hover{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.2)}
.summary{display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap;padding:12px 16px;background:rgba(255,255,255,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.7);border-radius:14px;margin:0 16px 16px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.summary span{white-space:nowrap}
.summary .sl{color:rgba(0,0,0,.35)}
.summary .sv{font-weight:600;margin-right:8px;color:#1a1a2e}
.summary .sv:last-child{margin-right:0}
.month-head td{background:rgba(99,102,241,.04);font-weight:600;font-size:11px;text-align:left;padding:8px 10px;color:rgba(0,0,0,.5);letter-spacing:.5px;border-bottom:1px solid rgba(0,0,0,.05)}
.total-row td{background:rgba(99,102,241,.06);font-weight:700;border-top:1px solid rgba(0,0,0,.08);font-size:12px;color:#1a1a2e}
@media(max-width:640px){
  body{max-width:100%;overflow-x:hidden}
  .cards{grid-template-columns:repeat(3,1fr);gap:6px;margin:0 8px 10px}
  .card{padding:10px;border-radius:10px}
  .card .value{font-size:15px}
  .card .label{font-size:8px}
  .section{margin:0 8px 6px;font-size:11px}
  .table-wrap{margin:0 8px 10px;border-radius:10px}
  .form-wrap{margin:0 8px 10px;padding:10px 12px}
  .summary{margin:0 8px 10px;padding:10px 12px;font-size:11px;gap:6px}
  .header-bar{font-size:14px;padding:12px 14px;margin-bottom:10px}
}
@media(max-width:400px){
  .cards{grid-template-columns:repeat(2,1fr)}
  th{font-size:9px;padding:6px 4px}
  td{font-size:10px;padding:5px 4px}
  .header-bar{font-size:13px;padding:10px 12px}
}
</style>
</head>
<body>
<div id="pinOverlay"><div id="pinBox"><h2>Введите ПИН-код</h2><input type="password" id="pinInput" maxlength="6" inputmode="numeric" autofocus><div class="err" id="pinErr"></div><button id="pinBtn">Войти</button></div></div>
<div id="content">
<div class="header-bar">Учет зарплаты</div>
<div class="cards" id="cards"></div>

<div class="section">Начисления</div>
<div class="table-wrap"><table><thead><tr>
<th>ID</th><th>Дата</th><th>Тип</th><th>Белая</th><th>Серая</th><th>Итого</th><th>Получено</th><th>Остаток</th><th>Статус</th>
</tr></thead><tbody id="accBody"></tbody></table></div>

<div class="section">Поступления</div>
<div class="table-wrap"><table><thead><tr>
<th>ID</th><th>Дата</th><th>Сумма</th><th>Комментарий</th>
</tr></thead><tbody id="payBody"></tbody></table></div>

<div class="form-wrap">
  <div class="frow">
    <label>Дата <input type="date" id="payDate"></label>
    <label>Сумма <input type="number" id="payAmount" min="1" step="1"></label>
    <label>Комментарий <input type="text" id="payComment" placeholder="Перевод, наличные..."></label>
    <button id="addPayBtn">+ Добавить</button>
  </div>
</div>

<div class="summary" id="summary"></div>

<script>
const STORAGE_KEY = 'salary_tracker';

function fmtDate(d){return d.toISOString().slice(0,10)}
function parseDate(s){let p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fm(n){return n.toLocaleString('ru-RU')}

const WHITE_ADV = 14000, GRAY_ADV = 55000;
const WHITE_SAL = 21670, GRAY_SAL = 65330;
const INDIA_AMOUNT = 30000; // Согласованное в Индии
const DATA_VERSION = 2;
const APP_PIN = '1234'; // ПИН-код для входа
// Clear old session PIN on new version
if(sessionStorage.getItem('salary_pin') && sessionStorage.getItem('salary_pin') !== APP_PIN){
  sessionStorage.removeItem('salary_pin');
}

function defaultData(){
  return {
    version: DATA_VERSION,
    interestDebt: 50160,
    accruals: [],
    payments: [],
    nextAccId: 1,
    nextPayId: 1
  };
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return null;
}
function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}

function seedData(){
  const d = defaultData();
  // March - June 2026 real data + correction + Согл. в Индии (4x30k)
  // Total accrued: 592,660 (472,660 salary + 120,000 India), paid: 321,680, remaining: 270,980
  // FIFO distribution: oldest accruals paid first
  d.accruals = [
    {id:1,date:'2026-03-01',type:'Согл. в Индии',white:0,gray:30000,paid:0},
    {id:2,date:'2026-03-25',type:'Аванс',white:14000,gray:55000,paid:69000},
    {id:3,date:'2026-04-01',type:'Согл. в Индии',white:0,gray:30000,paid:0},
    {id:4,date:'2026-04-05',type:'Зарплата',white:21670,gray:65330,paid:87000},
    {id:5,date:'2026-04-25',type:'Аванс',white:14000,gray:55000,paid:69000},
    {id:6,date:'2026-05-01',type:'Согл. в Индии',white:0,gray:30000,paid:0},
    {id:7,date:'2026-05-05',type:'Зарплата',white:21670,gray:30660,paid:52330},
    {id:8,date:'2026-05-05',type:'Доп. начисление',white:0,gray:34670,paid:34670},
    {id:9,date:'2026-05-25',type:'Аванс',white:14000,gray:55000,paid:9680},
    {id:10,date:'2026-06-01',type:'Согл. в Индии',white:0,gray:30000,paid:0},
    {id:11,date:'2026-06-05',type:'Зарплата',white:21670,gray:65330,paid:0},
    {id:12,date:'2026-06-09',type:'Корректировка',white:0,gray:4660,paid:0}
  ];
  d.payments = [
    {id:1,date:'2026-06-09',amount:321680,comment:'Выплаты до 09.06'}
  ];
  d.nextAccId = 13;
  d.nextPayId = 2;
  return d;
}

function generateAutoAccruals(data){
  const now = new Date();
  let maxDate = null;
  for(const a of data.accruals){
    const d = parseDate(a.date);
    if(!maxDate||d>maxDate) maxDate=d;
  }
  if(!maxDate) maxDate=new Date(now.getFullYear(),now.getMonth(),1);

  const sy=maxDate.getFullYear(), sm=maxDate.getMonth();
  const ey=now.getFullYear(), em=now.getMonth();

  let changed=false;
  for(let y=sy;y<=ey;y++){
    const mn=(y===sy)?sm:0, mx=(y===ey)?em:11;
    for(let m=mn;m<=mx;m++){
      // 1st - Согласованное в Индии
      const d1=new Date(y,m,1);
      if(d1>maxDate&&d1<=now){
        const ds=fmtDate(d1);
        if(!data.accruals.find(a=>a.date===ds&&a.type==='Согл. в Индии')){
          data.accruals.push({id:data.nextAccId++,date:ds,type:'Согл. в Индии',white:0,gray:INDIA_AMOUNT,paid:0});
          changed=true;
        }
      }
      const d25=new Date(y,m,25);
      if(d25>maxDate&&d25<=now){
        const ds=fmtDate(d25);
        if(!data.accruals.find(a=>a.date===ds&&a.type==='Аванс')){
          data.accruals.push({id:data.nextAccId++,date:ds,type:'Аванс',white:WHITE_ADV,gray:GRAY_ADV,paid:0});
          changed=true;
        }
      }
      const d5=new Date(y,m+1,5);
      if(d5>maxDate&&d5<=now){
        const ds=fmtDate(d5);
        if(!data.accruals.find(a=>a.date===ds&&a.type==='Зарплата')){
          data.accruals.push({id:data.nextAccId++,date:ds,type:'Зарплата',white:WHITE_SAL,gray:GRAY_SAL,paid:0});
          changed=true;
        }
      }
    }
  }
  if(changed) data.accruals.sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  return changed;
}

function calcStats(data){
  let totalAccrued=0, salaryDebt=0;
  for(const a of data.accruals){
    const tot=a.white+a.gray;
    totalAccrued+=tot;
    salaryDebt+=(tot-a.paid);
  }
  let paymentsTotal=0;
  for(const p of data.payments) paymentsTotal+=p.amount;

  return {
    totalAccrued,
    paymentsTotal,
    salaryDebt,
    interestDebt: data.interestDebt,
    totalDebt: salaryDebt+data.interestDebt
  };
}

function statusStr(paid,total){
  if(paid<=0) return 'Не получено';
  if(paid>=total) return 'Получено';
  return 'Частично';
}
function statusClass(paid,total){
  if(paid<=0) return 'stat-unpaid';
  if(paid>=total) return 'stat-paid';
  return 'stat-part';
}

function renderAll(){
  const data=loadData();
  const stats=calcStats(data);

  document.getElementById('cards').innerHTML=[
    {l:'Общий долг',v:stats.totalDebt,c:'debt'},
    {l:'Долг по ЗП',v:stats.salaryDebt,c:'debt'},
    {l:'Долг по %',v:stats.interestDebt,c:'debt',link:'https://github.com/kooovash-ux/salary-tracker/raw/master/%D0%94%D0%B5%D0%BA%D0%B0%D0%B1%D1%80%D1%8C.xlsx'}
  ].map(c=>{
    const val=`<div class="value ${c.c}">${fm(c.v)} &#8381;</div>`;
    return `<div class="card"><div class="label">${c.l}</div>${c.link?`<a href="${c.link}" target="_blank" style="text-decoration:none;color:inherit">${val}</a>`:val}</div>`;
  }).join('');

  const monthNames = ['','Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const sorted=[...data.accruals].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  let prevMonth='';
  document.getElementById('accBody').innerHTML=sorted.map(a=>{
    const d=parseDate(a.date);
    const mk=d.getFullYear()+'-'+d.getMonth();
    let head='';
    if(mk!==prevMonth){
      prevMonth=mk;
      head=`<tr class="month-head"><td colspan="9">${monthNames[d.getMonth()+1]} ${d.getFullYear()}</td></tr>`;
    }
    const tot=a.white+a.gray, rem=tot-a.paid;
    const st=statusStr(a.paid,tot), sc=statusClass(a.paid,tot);
    return head+`<tr>
      <td>${a.id}</td>
      <td>${a.date}</td>
      <td>${a.type}</td>
      <td class="num">${fm(a.white)}</td>
      <td class="num">${fm(a.gray)}</td>
      <td class="num">${fm(tot)}</td>
      <td class="num">${fm(a.paid)}</td>
      <td class="num">${fm(rem)}</td>
      <td class="${sc}">${st}</td>
    </tr>`;
  }).join('') + '\n' + (() => {
    const sw=sorted.reduce((s,a)=>s+a.white,0);
    const sg=sorted.reduce((s,a)=>s+a.gray,0);
    const stt=sorted.reduce((s,a)=>s+a.white+a.gray,0);
    const sp=sorted.reduce((s,a)=>s+a.paid,0);
    const sr=sorted.reduce((s,a)=>s+a.white+a.gray-a.paid,0);
    return `<tr class="total-row"><td colspan="3">ИТОГО</td><td class="num">${fm(sw)}</td><td class="num">${fm(sg)}</td><td class="num">${fm(stt)}</td><td class="num">${fm(sp)}</td><td class="num">${fm(sr)}</td><td></td></tr>`;
  })();

  const ps=[...data.payments].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  document.getElementById('payBody').innerHTML=ps.map(p=>
    `<tr><td>${p.id}</td><td>${p.date}</td><td class="num">${fm(p.amount)}</td><td>${p.comment||'-'}</td></tr>`
  ).join('');

  document.getElementById('summary').innerHTML=`
    <span><span class="sl">Начислено:</span> <span class="sv">${fm(stats.totalAccrued)} &#8381;</span></span>
    <span><span class="sl">Получено:</span> <span class="sv">${fm(stats.paymentsTotal)} &#8381;</span></span>
    <span><span class="sl">Долг по ЗП:</span> <span class="sv">${fm(stats.salaryDebt)} &#8381;</span></span>
    <span><span class="sl">Долг по %:</span> <span class="sv">${fm(stats.interestDebt)} &#8381;</span></span>
    <span><span class="sl">Общий долг:</span> <span class="sv" style="color:#c62828">${fm(stats.totalDebt)} &#8381;</span></span>
  `;
}

function applyFIFO(data,amount){
  let rem=amount;
  const sorted=[...data.accruals].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  for(const a of sorted){
    if(rem<=0) break;
    const unpaid=(a.white+a.gray)-a.paid;
    if(unpaid>0){
      const r=Math.min(unpaid,rem);
      a.paid+=r;
      rem-=r;
    }
  }
}

function addPayment(){
  const data=loadData();
  if(!data) return;
  const de=document.getElementById('payDate'), ae=document.getElementById('payAmount'), ce=document.getElementById('payComment');
  let date=de.value;
  if(!date){date=fmtDate(new Date());de.value=date}
  const amount=parseInt(ae.value);
  if(!amount||amount<1){alert('Введите сумму');return}
  data.payments.push({id:data.nextPayId++,date,amount,comment:ce.value.trim()||''});
  applyFIFO(data,amount);
  saveData(data);
  ae.value='';ce.value='';
  renderAll();
}

(function(){
  // reset via ?reset=1 or ?clear=1
  if(location.search.includes('reset')||location.search.includes('clear')){
    try{localStorage.removeItem(STORAGE_KEY)}catch(e){}
    if(location.search.includes('reset')) history.replaceState(null,'',location.pathname);
  }
  let data=loadData();
  // version check - re-seed if schema changed
  if(data && data.version !== DATA_VERSION){
    try{localStorage.removeItem(STORAGE_KEY)}catch(e){}
    data=seedData();saveData(data)
  }
  if(!data){data=seedData();saveData(data)}
  generateAutoAccruals(data);
  data.accruals.sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  saveData(data);
  document.getElementById('addPayBtn').addEventListener('click',addPayment);
  document.getElementById('payAmount').addEventListener('keydown',function(e){if(e.key==='Enter')addPayment()});
  renderAll();
})();

// PIN check
(function(){
  const pin = sessionStorage.getItem('salary_pin');
  if(pin === APP_PIN){
    document.getElementById('pinOverlay').style.display='none';
    document.getElementById('content').style.display='block';
    return;
  }
  const overlay = document.getElementById('pinOverlay');
  const input = document.getElementById('pinInput');
  const err = document.getElementById('pinErr');
  const btn = document.getElementById('pinBtn');
  function check(){
    if(input.value === APP_PIN){
      sessionStorage.setItem('salary_pin', APP_PIN);
      overlay.style.display='none';
      document.getElementById('content').style.display='block';
    } else {
      err.textContent='Неверный ПИН-код';
      input.value='';
      input.focus();
    }
  }
  btn.addEventListener('click', check);
  input.addEventListener('keydown',function(e){if(e.key==='Enter')check()});
  input.focus();
})();
</script>
</div>
</body>
</html>
